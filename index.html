<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="theme-color" content="#007AFF" />
  <meta name="description" content="工事写真帳の作成・送信アプリ" />

  <!-- iOS ホーム画面追加対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="工事写真台帳" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <title>工事写真台帳</title>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">工事写真台帳</h1>
    <button id="open-settings" class="header-btn" type="button" aria-label="設定">
      設定
    </button>
  </header>

  <main id="app" class="app-main">
    <!-- 工事情報（表紙・写真テキストの共通値） -->
    <section class="card" aria-label="工事情報">
      <h2 class="card__title">工事情報</h2>
      <div class="field">
        <label class="field__label" for="job-orderNo">注文番号</label>
        <input id="job-orderNo" class="field__input" type="text" inputmode="text"
          placeholder="例: 12345" />
      </div>
      <div class="field">
        <label class="field__label" for="job-name">工事名</label>
        <input id="job-name" class="field__input" type="text"
          placeholder="例: ○○ビル空調更新工事" />
      </div>
      <div class="field">
        <label class="field__label" for="job-place">工事場所</label>
        <input id="job-place" class="field__input" type="text"
          placeholder="例: 神戸市西区○○" />
      </div>
      <p class="card__note">
        工事名・工事場所は全写真の共通項目です（PDFの各写真の右側にも使われます）。
        写真ごとに設定するのは施工区分のみです。
      </p>
    </section>

    <!-- 写真選択バー -->
    <section class="picker" aria-label="写真の選択">
      <label class="btn btn--block" for="photo-input">
        写真を選択／追加
      </label>
      <!-- カメラロール等から複数選択。選択するたび既存に追加する -->
      <input
        id="photo-input"
        class="visually-hidden"
        type="file"
        accept="image/*"
        multiple
      />
      <p id="photo-count" class="picker__count">写真は未選択です</p>
    </section>

    <!-- 写真一覧（並べ替え・削除） -->
    <ul id="photo-list" class="photo-list" aria-label="選択した写真"></ul>

    <!-- 空状態メッセージ -->
    <section id="empty-state" class="empty-state">
      <p class="empty-state__text">
        「写真を選択／追加」から工事写真を選んでください。
      </p>
      <p class="empty-state__sub">並び順がそのままPDFの掲載順になります。</p>
    </section>

    <!-- PDF生成（写真がある時のみ表示） -->
    <section id="pdf-section" class="pdf-section is-hidden" aria-label="PDF生成">
      <button id="generate-pdf" class="btn btn--block" type="button">
        PDFを生成
      </button>
      <div id="pdf-result" class="pdf-result is-hidden"></div>
    </section>

    <!-- 最初からやり直す（写真＋工事情報をリセット。設定は残す） -->
    <button id="clear-all" class="btn btn--ghost btn--block is-hidden" type="button">
      最初からやり直す（クリア）
    </button>
  </main>

  <!-- ===== 設定画面（オーバーレイ） ===== -->
  <div id="settings" class="overlay is-hidden" role="dialog" aria-modal="true"
    aria-label="設定">
    <header class="overlay__header">
      <button id="close-settings" class="header-btn header-btn--left" type="button">
        閉じる
      </button>
      <h2 class="overlay__title">設定</h2>
      <span class="header-btn header-btn--spacer" aria-hidden="true"></span>
    </header>

    <div class="overlay__body">
      <!-- 自社情報 -->
      <section class="card" aria-label="自社情報">
        <h3 class="card__title">自社情報（表紙下部に表示）</h3>
        <div class="field">
          <label class="field__label" for="co-name">会社名</label>
          <input id="co-name" class="field__input" type="text" />
        </div>
        <div class="field">
          <label class="field__label" for="co-postal">郵便番号</label>
          <input id="co-postal" class="field__input" type="text" inputmode="numeric" />
        </div>
        <div class="field">
          <label class="field__label" for="co-address">住所</label>
          <input id="co-address" class="field__input" type="text" />
        </div>
        <div class="field">
          <label class="field__label" for="co-tel">TEL</label>
          <input id="co-tel" class="field__input" type="text" inputmode="tel" />
        </div>
        <div class="field">
          <label class="field__label" for="co-fax">FAX</label>
          <input id="co-fax" class="field__input" type="text" inputmode="tel" />
        </div>
      </section>

      <!-- メール雛形 -->
      <section class="card" aria-label="メール雛形">
        <h3 class="card__title">メール雛形（Phase 4 で使用）</h3>
        <div class="field">
          <label class="field__label" for="mail-to">送信宛先（元請けのメール）</label>
          <input id="mail-to" class="field__input" type="email" inputmode="email"
            placeholder="例: genba@example.co.jp" />
        </div>
        <div class="field">
          <label class="field__label" for="mail-subject">件名の雛形</label>
          <input id="mail-subject" class="field__input" type="text"
            placeholder="例: 工事写真帳送付の件（{工事名}）" />
          <p class="field__hint"><code>{工事名}</code> は工事名に置き換わります。</p>
        </div>
      </section>

      <!-- 施工区分タグ -->
      <section class="card" aria-label="施工区分タグ">
        <h3 class="card__title">施工区分タグ</h3>
        <p class="card__note">写真ごとの区分でワンタップ選択できる候補です。</p>
        <ul id="cat-list" class="cat-list"></ul>
        <div class="cat-add">
          <input id="cat-new" class="field__input" type="text"
            placeholder="区分を追加（例: 配管）" />
          <button id="cat-add-btn" class="btn" type="button">追加</button>
        </div>
        <button id="cat-reset" class="btn btn--ghost btn--block" type="button">
          初期の区分に戻す
        </button>
      </section>

      <p class="overlay__saved">入力内容は自動的に保存されます。</p>
    </div>
  </div>

  <!-- PDF生成ライブラリ（ローカル同梱・オフライン対応） -->
  <script src="js/lib/pdf-lib.min.js"></script>
  <script src="js/lib/fontkit.umd.min.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
